<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日行情记录</title>
    <!-- 引入 marked.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            background-color: #f5f5f5;
        }

        /* 左侧日历区域 */
        .calendar-container {
            width: 400px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header button {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .calendar-header button:hover {
            background: #f0f0f0;
        }

        .calendar-title {
            font-size: 20px;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #666;
            font-weight: bold;
        }

        .calendar-date {
            text-align: center;
            padding: 12px 8px;
            cursor: pointer;
            border-radius: 6px;
            position: relative;
            font-size: 14px;
        }

        .calendar-date:hover {
            background: #f0f0f0;
        }

        .calendar-date.has-content::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #ff4444;
            border-radius: 50%;
        }

        .calendar-date.today {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: bold;
        }

        .calendar-date.selected {
            background: #1976d2;
            color: white;
        }

        /* 右侧内容区域 */
        .content-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: white;
        }

        .content-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        /* Markdown 样式优化 */
        .content-body {
            line-height: 1.8;
            color: #333;
        }

        .content-body h1 {
            font-size: 28px;
            margin: 24px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .content-body h2 {
            font-size: 24px;
            margin: 20px 0 14px;
            color: #333;
        }

        .content-body h3 {
            font-size: 20px;
            margin: 18px 0 12px;
            color: #444;
            font-weight: 600;
        }

        .content-body h4 {
            font-size: 18px;
            margin: 16px 0 10px;
        }

        .content-body p {
            margin: 12px 0;
        }

        .content-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }

        .content-body th, .content-body td {
            border: 1px solid #ddd;
            padding: 12px 14px;
            text-align: left;
        }

        .content-body th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .content-body tr:hover {
            background: #fafafa;
        }

        .content-body ul, .content-body ol {
            margin: 14px 0;
            padding-left: 28px;
        }

        .content-body li {
            margin: 6px 0;
        }

        .content-body strong {
            color: #222;
            font-weight: 600;
        }

        .content-body em {
            color: #555;
        }

        .content-body blockquote {
            border-left: 4px solid #ddd;
            padding-left: 16px;
            margin: 16px 0;
            color: #666;
            background: #f9f9f9;
        }

        .content-body code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 14px;
        }

        .content-body pre {
            background: #f4f4f4;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .content-body pre code {
            background: none;
            padding: 0;
        }

        .content-body a {
            color: #1976d2;
            text-decoration: none;
        }

        .content-body a:hover {
            text-decoration: underline;
        }

        .content-body hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 24px 0;
        }

        .no-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1976d2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 左侧日历区域 -->
    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prev-month">&#8592; 上月</button>
            <span class="calendar-title" id="calendar-title"></span>
            <button id="next-month">下月 &#8594;</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- 右侧内容区域 -->
    <div class="content-container" id="content-container">
        <div class="no-content">请选择一个日期查看行情记录</div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = null;
        let filesWithContent = new Set();

        // 初始化
        async function init() {
            await loadFilesWithContent();
            renderCalendar();
        }

        // 加载有内容的文件列表
        async function loadFilesWithContent() {
            try {
                // 通过 API 获取文件列表
                const response = await fetch('/api/files');
                if (response.ok) {
                    const files = await response.json();
                    filesWithContent = new Set(files);
                } else {
                    console.warn('无法获取文件列表，使用演示数据');
                    useDemoData();
                }
            } catch (error) {
                console.error('加载文件列表失败，使用演示数据:', error);
                useDemoData();
            }
        }

        // 使用演示数据
        function useDemoData() {
            const demoDates = [
                '2026-03-25', '2026-03-26', '2026-03-27', '2026-03-28', '2026-03-29',
                '2026-03-30', '2026-03-31', '2026-04-01', '2026-04-02', '2026-04-03',
                '2026-04-04', '2026-04-05', '2026-04-06', '2026-04-07', '2026-04-08',
                '2026-04-09', '2026-04-10', '2026-04-11', '2026-04-12', '2026-04-13',
                '2026-04-14', '2026-04-15', '2026-04-16', '2026-04-17', '2026-04-20',
                '2026-04-21', '2026-04-22', '2026-04-23', '2026-04-24'
            ];
            filesWithContent = new Set(demoDates);
        }

        // 渲染日历
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('calendar-title').textContent = 
                `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            // 星期标题
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(day => {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.textContent = day;
                grid.appendChild(dayEl);
            });
            
            // 填充上个月的日期
            for (let i = 0; i < firstDay.getDay(); i++) {
                const emptyEl = document.createElement('div');
                emptyEl.className = 'calendar-date';
                emptyEl.style.visibility = 'hidden';
                grid.appendChild(emptyEl);
            }
            
            // 填充当前月的日期
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateEl = document.createElement('div');
                dateEl.className = 'calendar-date';
                dateEl.textContent = day;
                
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                if (filesWithContent.has(dateStr)) {
                    dateEl.classList.add('has-content');
                }
                
                const today = new Date();
                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dateEl.classList.add('today');
                }
                
                if (selectedDate === dateStr) {
                    dateEl.classList.add('selected');
                }
                
                dateEl.addEventListener('click', () => loadContent(dateStr));
                grid.appendChild(dateEl);
            }
        }

        // 加载内容
        async function loadContent(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            
            const container = document.getElementById('content-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                // 尝试加载markdown文件
                const response = await fetch(`./${dateStr}.md`);
                if (response.ok) {
                    const content = await response.text();
                    renderContent(dateStr, content);
                } else {
                    container.innerHTML = '<div class="no-content">该日期暂无行情记录</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="no-content">加载失败，请稍后重试</div>';
                console.error('加载内容失败:', error);
            }
        }

        // 渲染内容
        function renderContent(dateStr, content) {
            const container = document.getElementById('content-container');
            const date = new Date(dateStr);
            const title = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 行情记录`;
            
            // 配置 marked.js
            marked.setOptions({
                breaks: true,  // 支持换行符
                gfm: true      // 启用 GitHub Flavored Markdown
            });
            
            // 使用 marked.js 解析 markdown
            const renderedHtml = marked.parse(content);
            
            container.innerHTML = `
                <div class="content-title">${title}</div>
                <div class="content-body">${renderedHtml}</div>
            `;
        }

        // 事件监听
        document.getElementById('prev-month').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // 启动
        init();
    </script>
</body>
</html>
